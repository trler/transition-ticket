name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v4

      - name: Virtual Environment
        run: |
          poetry config virtualenvs.create true --local
          poetry config virtualenvs.in-project true --local

      - name: Install Dependencies
        run: poetry install --with dev

      - name: Package
        run: poetry run pyinstaller --clean --noconfirm --log-level WARN cli.spec

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          Get-ChildItem -Path dist | ForEach-Object {
            Rename-Item -Path $_.FullName -NewName "$tag-$($_.Name)"
          }

      - name: Rename (Linux)
        if: runner.os == 'Linux'
        run: |
          tag=${GITHUB_REF#refs/tags/}
          for file in dist/*; do
            if [ -f "$file" ]; then
              mv "$file" "dist/$tag-$(basename "$file")"
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release
          cp artifacts/release-Windows/* release/ 2>/dev/null || true
          cp artifacts/release-Linux/* release/ 2>/dev/null || true

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
          generate_release_notes: true
